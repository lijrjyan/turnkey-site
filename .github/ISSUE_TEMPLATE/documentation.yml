name: Documentation problem
description: Report incorrect, unclear, inaccessible, or missing public documentation.
title: "docs: "
labels: [documentation]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private prompts, internal datasets, or personal data.
  - type: input
    id: page
    attributes:
      label: Page URL
      placeholder: https://lijrjyan.github.io/turnkey-site/...
    validations:
      required: true
  - type: input
    id: product
    attributes:
      label: Product version or commit
      description: Required when the report concerns runtime behavior.
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or unclear?
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: Suggested correction or expected experience
